version: '3.9'
services:
  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -e .[dev] && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../../:/workspace
    ports:
      - "8000:8000"

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../../:/workspace
    ports:
      - "3000:3000"
